<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꼬라다이스 관리표 (가로형)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        /* A4 가로 출력을 위한 설정 */
        @page {
            size: A4 landscape;
            margin: 10mm;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdfbf7;
            padding: 20px;
            margin: 0;
        }

        .container-landscape {
            width: 100%;
            max-width: 1100px; /* A4 가로 비율에 맞춘 최대 너비 */
            margin: 0 auto;
        }

        .table-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid #e5e7eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: #fbbf24;
            color: #451a03;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #f59e0b;
            font-size: 1.2rem;
            font-weight: 700;
        }

        td {
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            text-align: center;
            height: 75px; /* 가로형일 때 더 시원하게 높이 조정 */
            font-size: 1.1rem;
        }

        tr:nth-child(even) {
            background-color: #fffbeb;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
        }

        .main-title-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #92400e;
            font-size: 3.5rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1.1;
        }

        .month-display {
            display: flex;
            align-items: center;
            background-color: #fef3c7;
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #fbbf24;
        }

        .month-input-box {
            width: 70px;
            height: 40px;
            background-color: white;
            border-radius: 6px;
            margin-right: 8px;
        }

        .month-label {
            font-size: 1.4rem;
            font-weight: bold;
            color: #92400e;
        }

        .sub-text {
            color: #b45309;
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 500;
        }

        .print-btn {
            background-color: #d97706;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .print-btn:hover {
            background-color: #b45309;
        }

        .guide-text {
            font-size: 0.85rem;
            font-weight: normal;
            display: block;
            margin-top: 4px;
            color: #78350f;
        }

        @media print {
            .print-btn { display: none; }
            body { background-color: white; padding: 0; }
            .container-landscape { max-width: 100%; }
            .table-container { box-shadow: none; border: 1.5px solid black; }
            th { background-color: #f3f4f6 !important; color: black !important; border: 1.5px solid black !important; }
            td { border: 1.5px solid black !important; }
            h1 { color: black; font-size: 3.2rem; }
            .month-display { border-color: black; background-color: white; }
            .sub-text, .guide-text, .month-label { color: #333; }
            .footer-box { border: 1.5px solid black !important; background-color: white !important; }
        }

        .chicken-icon {
            font-size: 3rem;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="container-landscape">
        <div class="header-container">
            <div class="title-area">
                <div class="main-title-wrapper">
                    <h1><span class="chicken-icon">🐔</span>꼬라다이스 관리표</h1>
                    <div class="month-display">
                        <div class="month-input-box"></div>
                        <span class="month-label">월</span>
                    </div>
                </div>
                <p class="sub-text">건강한 꼬꼬들을 위한 기록</p>
            </div>
            <button class="print-btn" onclick="window.print()">🖨️ 가로 방향 인쇄</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">날짜</th>
                        <th style="width: 25%;">
                            물 상태
                            <span class="guide-text">(확인: O / 교체: X)</span>
                        </th>
                        <th style="width: 15%;">알 (개수)</th>
                        <th style="width: 45%;">사료 및 특이사항</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- 12행 생성 -->
                </tbody>
            </table>
        </div>
        
        <div class="mt-8 p-5 bg-orange-50 border border-orange-200 rounded-lg text-center footer-box">
            <p class="text-orange-900 font-bold text-xl">
                📢 수요일/일요일마다 <span class="text-red-600 font-black">천관</span>과 <span class="text-blue-600 font-black">해관</span>이 번갈아가며 관리합니다.
            </p>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('table-body');
        for (let i = 0; i < 12; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            `;
            tableBody.appendChild(row);
        }
    </script>
</body>
</html>
