<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꼬라다이스 관리표 (A4 최적화)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        /* A4 가로 출력을 위한 설정 */
        @page {
            size: A4 landscape;
            margin: 5mm; /* 여백을 조금 더 줄여서 내용 확보 */
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdfbf7;
            padding: 10px;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container-landscape {
            width: 100%;
            max-width: 1050px;
            background-color: transparent;
        }

        .table-container {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #e5e7eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: #fbbf24;
            color: #451a03;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid #f59e0b;
            font-size: 1.1rem;
            font-weight: 700;
        }

        td {
            padding: 8px 10px;
            border: 1px solid #e5e7eb;
            text-align: center;
            height: 55px; /* 한 장에 들어가도록 높이 살짝 축소 */
            font-size: 1rem;
        }

        tr:nth-child(even) {
            background-color: #fffbeb;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
        }

        .main-title-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            color: #92400e;
            font-size: 3rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .month-display {
            display: flex;
            align-items: center;
            background-color: #fef3c7;
            padding: 6px 15px;
            border-radius: 8px;
            border: 2px solid #fbbf24;
        }

        .month-input-box {
            width: 50px;
            height: 30px;
            background-color: white;
            border-radius: 4px;
            margin-right: 6px;
        }

        .month-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #92400e;
        }

        .sub-text {
            color: #b45309;
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .print-btn {
            background-color: #d97706;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .guide-text {
            font-size: 0.75rem;
            font-weight: normal;
            display: block;
            margin-top: 2px;
            color: #78350f;
        }

        .footer-box {
            margin-top: 15px;
            padding: 10px;
            background-color: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            text-align: center;
        }

        @media print {
            .print-btn { display: none; }
            body { background-color: white; padding: 0; }
            .container-landscape { max-width: 100%; }
            .table-container { box-shadow: none; border: 1px solid black; }
            th { background-color: #eee !important; color: black !important; border: 1px solid black !important; }
            td { border: 1px solid black !important; height: 50px !important; }
            h1 { color: black; font-size: 2.5rem; }
            .month-display { border-color: black; background-color: white; }
            .footer-box { border: 1px solid black !important; background-color: white !important; margin-top: 10px; }
        }

        .chicken-icon {
            font-size: 2.5rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container-landscape">
        <div class="header-container">
            <div class="title-area">
                <div class="main-title-wrapper">
                    <h1><span class="chicken-icon">🐔</span>꼬라다이스 관리표</h1>
                    <div class="month-display">
                        <div class="month-input-box"></div>
                        <span class="month-label">월</span>
                    </div>
                </div>
                <p class="sub-text">건강한 꼬꼬들을 위한 기록</p>
            </div>
            <button class="print-btn" onclick="window.print()">관리표 인쇄</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">날짜</th>
                        <th style="width: 25%;">
                            물 상태
                            <span class="guide-text">(확인: O / 교체: X)</span>
                        </th>
                        <th style="width: 15%;">알 (개수)</th>
                        <th style="width: 45%;">사료 및 특이사항</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- 12행 생성 -->
                </tbody>
            </table>
        </div>
        
        <div class="footer-box">
            <p class="text-orange-900 font-bold text-lg">
                📢 수요일/일요일마다 <span class="text-red-600 font-black">천관</span>과 <span class="text-blue-600 font-black">해관</span>이 번갈아가며 관리합니다.
            </p>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('table-body');
        // A4 한 장에 안전하게 들어가도록 줄 간격과 개수 유지
        for (let i = 0; i < 12; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `<td></td><td></td><td></td><td></td>`;
            tableBody.appendChild(row);
        }
    </script>
</body>
</html>
